name: Build GPU Hook SO
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    env:
      NDK_VERSION: r21b
      ANDROID_PLATFORM: android-29

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -e
          if [ -d "${{ github.workspace }}/android-ndk-${NDK_VERSION}" ]; then
            echo "NDK already exists"
          else
            wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux-x86_64.zip
            unzip -q android-ndk-${NDK_VERSION}-linux-x86_64.zip
          fi
          echo "NDK_ROOT=${{ github.workspace }}/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: CMake 编译 ${{ matrix.abi }}
        run: |
          set -e
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          cmake --build . -- -j$(nproc)

      - name: 上传编译产物 so
        uses: actions/upload-artifact@v4
        with:
          name: libgpuhook-${{ matrix.abi }}
          path: |
            build/libgpuhook.so
            build/*.so
