name: Build GPU Hook SO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载Android NDK r21b
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r21b-linux-x86_64.zip
          unzip android-ndk-r21b-linux-x86_64.zip
          echo "NDK_ROOT=$PWD/android-ndk-r21b" >> $GITHUB_ENV

      - name: CMake编译arm64-v8a
        run: |
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DCMAKE_BUILD_TYPE=Release \
          ..
          make -j$(nproc)

      - name: 上传编译产物so
        uses: actions/upload-artifact@v4
        with:
          name: libgpuhook-arm64
          path: build/libgpuhook.so
